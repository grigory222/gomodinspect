services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  gomodinspect:
    build: .
    env_file:
      - .env
    environment:
      - REDIS_ADDR=redis:6379
    volumes:
      - ./config.yaml:/config.yaml:ro
    depends_on:
      - redis

volumes:
  redis_data:
